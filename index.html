<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snakes &amp; Ladders</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="table-felt">
    <header class="game-header">
      <h1><span class="title-snake">Snakes</span> <span class="amp">&amp;</span> <span class="title-ladder">Ladders</span></h1>
      <p class="subtitle">Climb the ladders. Dodge the fangs. First to 100 wins.</p>
    </header>

    <main class="game-layout">

      <!-- BOARD -->
      <div class="board-wrapper">
        <div class="board" id="board">
          <!-- 100 cells injected by script.js -->
          <svg id="board-svg" class="board-svg" preserveAspectRatio="none">
            <defs>
              <linearGradient id="woodRail" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#a9712f"/>
                <stop offset="50%" stop-color="#e0a85e"/>
                <stop offset="100%" stop-color="#8a5a23"/>
              </linearGradient>

              <linearGradient id="snakeGradA" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#3fae4f"/>
                <stop offset="100%" stop-color="#1f6e2c"/>
              </linearGradient>
              <linearGradient id="snakeGradB" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#ff5d5d"/>
                <stop offset="100%" stop-color="#b3122a"/>
              </linearGradient>
              <linearGradient id="snakeGradC" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#6fc7ff"/>
                <stop offset="100%" stop-color="#1c5fa3"/>
              </linearGradient>

              <pattern id="scalePattern" patternUnits="userSpaceOnUse" width="1.4" height="1.4" patternTransform="rotate(0)">
                <circle cx="0.7" cy="0.7" r="0.55" fill="rgba(255,255,255,0.18)"/>
              </pattern>

              <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
              </filter>
            </defs>
            <g id="ladders-layer"></g>
            <g id="snakes-layer"></g>
          </svg>
          <div id="tokens-layer" class="tokens-layer"></div>
        </div>
      </div>

      <!-- SIDE PANEL -->
      <aside class="side-panel">

        <section class="setup-card" id="setup-card">
          <h2>Players</h2>
          <div class="player-count-select" id="player-count-select">
            <button class="count-btn" data-count="2">2</button>
            <button class="count-btn" data-count="3">3</button>
            <button class="count-btn" data-count="4">4</button>
          </div>
          <div class="player-config" id="player-config"></div>
          <button class="start-btn" id="start-btn">Start Game</button>
        </section>

        <section class="players-card" id="players-card" hidden>
          <h2>Players</h2>
          <ul class="player-list" id="player-list"></ul>
        </section>

        <section class="dice-card" id="dice-card" hidden>
          <div class="dice-stage">
            <div class="dice" id="dice">
              <div class="dice-face" id="dice-face">
                <span class="pip p1"></span><span class="pip p2"></span>
                <span class="pip p3"></span><span class="pip p4"></span>
                <span class="pip p5"></span><span class="pip p6"></span>
              </div>
            </div>
          </div>
          <button class="roll-btn" id="roll-btn">Roll Dice</button>
          <p class="turn-msg" id="turn-msg">&nbsp;</p>
        </section>

      </aside>
    </main>
  </div>

  <!-- WIN OVERLAY -->
  <div class="win-overlay" id="win-overlay" hidden>
    <div class="win-card">
      <h2 id="win-text">Winner!</h2>
      <button class="start-btn" id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
